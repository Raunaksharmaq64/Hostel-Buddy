<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Your Hostel Buddy</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-box {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }
        
        /* Select specific styling to make options visible */
        .form-select option {
            background-color: var(--surface);
            color: white;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.3);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .error-message {
            color: var(--accent);
            margin-top: 1rem;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="auth-container hero">
        <div class="auth-box glass-panel card-3d">
            <h2 style="font-size: 2.5rem; margin-bottom: 0.5rem;"><span class="logo">Login</span></h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Welcome back to Hostel Buddy</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">I am a...</label>
                    <select class="form-select" id="role" required>
                        <option value="Student">Student</option>
                        <option value="Owner">Hostel / PG Owner</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Secure Login</button>
            </form>
            <div id="errorMessage" class="error-message"></div>
            
            <p style="margin-top: 2rem; color: var(--text-muted);">
                Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
            </form>
        </div>
    </div>

    <script>
        gsap.from(".auth-box", { y: 50, opacity: 0, duration: 1, ease: "power3.out" });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const role = document.getElementById('role').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '';
            
            const btn = document.querySelector('.auth-btn');
            btn.innerHTML = 'Logging in...';
            btn.style.opacity = '0.7';

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Save token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect based on role
                gsap.to(".auth-box", { scale: 0.9, opacity: 0, duration: 0.5, onComplete: () => {
                    if (role === 'Student') window.location.href = 'student-dashboard.html';
                    else if (role === 'Owner') window.location.href = 'owner-dashboard.html';
                    else if (role === 'Admin') window.location.href = 'admin-dashboard.html';
                }});

            } catch (error) {
                errorDiv.textContent = error.message;
                btn.innerHTML = 'Secure Login';
                btn.style.opacity = '1';
                
                // Shake animation on error
                gsap.fromTo(".auth-box", 
                    { x: -10 }, 
                    { x: 10, duration: 0.1, yoyo: true, repeat: 5, onComplete: () => {
                        gsap.set(".auth-box", { x: 0 })
                    }}
                );
            }
        });
    </script>
</body>
</html>
